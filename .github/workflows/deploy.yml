name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    # When triggered by push to main, default to prod. Otherwise, use the selected input.
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'prod' }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Generate DB Schema
        run: bun run db:generate

      - name: Migrate Database
        run: bun run db:migrate
        env:
          # This should be your production or staging database URL depending on the environment
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Deploy
        # We append the environment flag if it's staging, otherwise it deploys as default (prod)
        # Using the existing deploy script from package.json
        run: bun run deploy ${{ github.event.inputs.environment == 'staging' && '--env staging' || '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
